<!DOCTYPE html>
<html lang="en" ng-app="apbDemo">
<head>
  <meta charset="UTF-8">
  <title>APB Demo - Monthly Spending Summary Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- External CSS -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="src/assets/css/app.css">
</head>
<body class="apb-body">
  <div class="container-fluid">
    <header class="dashboard-header">
      <div class="dashboard-header-title">Monthly Spending Summary</div>
      <div class="dashboard-header-subtitle">High-level monthly credit card spend overview with KPIs and category insights</div>
    </header>

    <section class="dashboard-breadcrumb">
      <ol class="breadcrumb">
        <li><a href="#/monthly-summary">Home</a></li>
        <li class="active">Monthly Spending Summary</li>
      </ol>
    </section>

    <section class="dashboard-tabs">
      <ul class="nav nav-tabs">
        <li class="active"><a href="javascript:void(0)">Monthly Overview</a></li>
        <li class="disabled"><a href="javascript:void(0)">Advanced Insights</a></li>
      </ul>
    </section>

    <div ng-view></div>

    <footer class="footer-bar">
      <div class="footer-content">
        <span class="footer-text">© 2026 APB Demo - Monthly Spending Summary Dashboard</span>
        <span class="footer-links">
          <a href="javascript:void(0)">Privacy</a>
          <a href="javascript:void(0)">Terms</a>
        </span>
      </div>
    </footer>
  </div>

  <!-- Angular and external JS libs -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.7.9/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.7.9/angular-route.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.7.9/angular-animate.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.7.9/angular-sanitize.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular-ui-bootstrap/2.5.6/ui-bootstrap-tpls.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>

  <!-- App Module & Routes -->
  <script src="src/app/app.module.js"></script>
  <script src="src/app/app.routes.js"></script>

  <!-- Config -->
  <script src="src/app/config/config.constants.js"></script>
  <script src="src/app/config/env.config.service.js"></script>
  <script src="src/app/config/env.default.json"></script>
  <script src="src/app/config/env.dev.json"></script>
  <script src="src/app/config/env.prod.json"></script>

  <!-- Models -->
  <script src="src/app/models/monthly-summary.model.js"></script>
  <script src="src/app/models/kpi.model.js"></script>
  <script src="src/app/models/breakdown.model.js"></script>
  <script src="src/app/models/error.model.js"></script>

  <!-- Filters -->
  <script src="src/app/filters/currency-format.filter.js"></script>
  <script src="src/app/filters/date-format.filter.js"></script>
  <script src="src/app/filters/percentage.filter.js"></script>

  <!-- Mock Data -->
  <script src="src/mock/monthly-summary.mock-data.js"></script>
  <script src="src/mock/kpi.mock-data.js"></script>
  <script src="src/mock/breakdown.mock-data.js"></script>

  <!-- Factories -->
  <script src="src/app/factories/model-factory.js"></script>

  <!-- Services -->
  <script src="src/app/services/logging.service.js"></script>
  <script src="src/app/services/error-handling.service.js"></script>
  <script src="src/app/services/http-interceptor.service.js"></script>
  <script src="src/app/services/env-config-wrapper.service.js"></script>
  <script src="src/app/services/month-context.service.js"></script>
  <script src="src/app/services/monthly-summary.service.js"></script>
  <script src="src/app/services/kpi.service.js"></script>
  <script src="src/app/services/breakdown.service.js"></script>

  <!-- Controllers -->
  <script src="src/app/controllers/monthly-summary.controller.js"></script>

  <!-- Directives -->
  <script src="src/app/directives/monthly-summary-card.directive.js"></script>
  <script src="src/app/directives/kpi-card.directive.js"></script>
  <script src="src/app/directives/breakdown-chart.directive.js"></script>

  <!-- Assets JS -->
  <script src="src/assets/js/chart-config.js"></script>
</body>
</html>
