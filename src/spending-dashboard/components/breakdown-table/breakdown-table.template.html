<div class="panel panel-default spending-breakdown-card">
  <div class="panel-heading">
    <h3 class="panel-title">Spend Breakdown Details</h3>
  </div>
  <div class="panel-body">
    <div class="table-responsive" ng-if="vm.getCategoriesWithPercentage().length">
      <table class="table table-striped table-bordered spending-breakdown-table">
        <thead>
          <tr>
            <th scope="col">Category</th>
            <th scope="col" class="text-right">Amount</th>
            <th scope="col" class="text-right">Percentage</th>
          </tr>
        </thead>
        <tbody>
          <tr ng-repeat="category in vm.getCategoriesWithPercentage()">
            <td>{{ category.name }}</td>
            <td class="text-right">{{ category.amount | number:2 }}</td>
            <td class="text-right">{{ category.percentage | number:1 }}%</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div ng-if="!vm.getCategoriesWithPercentage().length" class="text-muted">
      No breakdown data available.
    </div>
  </div>
</div>
