<!DOCTYPE html>
<html lang="en" ng-app="apbDemo">
<head>
  <meta charset="UTF-8">
  <title>APB Demo - Monthly Spending Summary Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- External CSS -->
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <link href="assets/css/app.css" rel="stylesheet">

  <!-- External JS Libraries -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.7.9/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.7.9/angular-route.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.7.9/angular-animate.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.7.9/angular-sanitize.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular-ui-bootstrap/2.5.6/ui-bootstrap-tpls.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>

  <!-- Angular Module -->
  <script src="app/app.module.js"></script>

  <!-- Configuration -->
  <script src="app/config/config.constants.js"></script>
  <script src="app/config/env.config.service.js"></script>
  <script src="app/app.routes.js"></script>

  <!-- Models -->
  <script src="app/models/monthly-summary.model.js"></script>
  <script src="app/models/kpi.model.js"></script>
  <script src="app/models/breakdown.model.js"></script>
  <script src="app/models/error.model.js"></script>

  <!-- Filters -->
  <script src="app/filters/currency-format.filter.js"></script>
  <script src="app/filters/date-format.filter.js"></script>
  <script src="app/filters/percentage.filter.js"></script>

  <!-- Mock Data files -->
  <script src="mock/monthly-summary.mock-data.js"></script>
  <script src="mock/kpi.mock-data.js"></script>
  <script src="mock/breakdown.mock-data.js"></script>
  <script src="mock/month-context.mock-data.js"></script>

  <!-- Services -->
  <script src="app/factories/model-factory.js"></script>
  <script src="app/services/logging.service.js"></script>
  <script src="app/services/error-handling.service.js"></script>
  <script src="app/services/http-interceptor.service.js"></script>
  <script src="app/services/month-context.service.js"></script>
  <script src="app/services/monthly-summary.service.js"></script>
  <script src="app/services/kpi.service.js"></script>
  <script src="app/services/breakdown.service.js"></script>

  <!-- Controllers -->
  <script src="app/controllers/monthly-summary.controller.js"></script>

  <!-- Directives -->
  <script src="app/directives/monthly-summary-card.directive.js"></script>
  <script src="app/directives/kpi-card.directive.js"></script>
  <script src="app/directives/breakdown-chart.directive.js"></script>

  <!-- Assets JS (Chart Config) -->
  <script src="assets/js/chart-config.js"></script>
</head>
<body>
  <div class="container-fluid dashboard-container" ng-view></div>
</body>
</html>
