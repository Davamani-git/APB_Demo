<div class="monthly-dashboard-container" ng-cloak>
  <div class="row">
    <div class="col-xs-12">
      <div class="alert alert-info" ng-if="vm.isLoading">
        Loading your monthly spending summary...
      </div>
      <div class="alert alert-danger alert-space" ng-if="!vm.isLoading && vm.errorMessage">
        {{vm.errorMessage}}
      </div>
    </div>
  </div>

  <div class="row" ng-if="!vm.isLoading">
    <div class="col-md-4 col-sm-6">
      <month-selector
        available-months="vm.availableMonths"
        selected-month="vm.selectedMonth"
        on-month-change="vm.onMonthChange(selectedMonth)">
      </month-selector>
    </div>
    <div class="col-md-8 col-sm-6 text-right">
      <button type="button" class="btn btn-primary" ng-click="vm.navigateToInsights()">
        Explore deeper insights
      </button>
    </div>
  </div>

  <div class="row" ng-if="!vm.isLoading">
    <div class="col-xs-12">
      <summary-kpi-cards kpis="vm.kpis"></summary-kpi-cards>
    </div>
  </div>

  <div class="row" ng-if="!vm.isLoading">
    <div class="col-xs-12">
      <basic-spend-breakdown-chart
        breakdown-series="vm.breakdownSeries"
        mode="{{vm.breakdownMode}}">
      </basic-spend-breakdown-chart>
    </div>
  </div>
</div>
