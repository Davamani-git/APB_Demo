<div class="dashboard-header">
  <h2>Monthly Spending Summary</h2>
</div>

<div class="month-selector-container">
  <month-selector
    available-months="vm.availableMonths"
    selected-month="vm.selectedMonth"
    on-month-change="vm.onMonthChange(selectedMonth)">
  </month-selector>
</div>

<div class="loading-indicator text-center" ng-if="vm.isLoading">
  <span>Loading monthly summary...</span>
</div>

<div class="error-banner alert alert-warning" ng-if="!vm.isLoading && vm.errorMessage">
  <span ng-bind="vm.errorMessage"></span>
</div>

<div ng-if="!vm.isLoading && !vm.errorMessage">
  <div class="no-data-message" ng-if="vm.summaryModel && vm.summaryModel.transactionCount === 0">
    <div class="alert alert-info">
      There is no spending activity for the selected month.
    </div>
  </div>

  <div class="kpi-cards-container" ng-if="vm.kpis && vm.kpis.length">
    <summary-kpi-cards kpis="vm.kpis"></summary-kpi-cards>
  </div>

  <div class="breakdown-chart-container" ng-if="vm.breakdownSeries && vm.breakdownSeries.length">
    <basic-spend-breakdown-chart
      breakdown-series="vm.breakdownSeries"
      mode="{{vm.breakdownMode}}"
      on-category-click="vm.navigateToInsights()">
    </basic-spend-breakdown-chart>
  </div>
</div>
