<div class="row">
  <div class="col-sm-3" ng-repeat="kpi in kpis" class="kpi-card">
    <div class="panel panel-default">
      <div class="panel-heading">
        <h3 class="panel-title" ng-bind="kpi.label"></h3>
      </div>
      <div class="panel-body">
        <p class="kpi-value" ng-bind="kpi.value"></p>
        <p class="kpi-unit" ng-if="kpi.unit" ng-bind="kpi.unit"></p>
      </div>
    </div>
  </div>
</div>
