<div class="card breakdown-card">
  <div class="card-header">
    <div class="card-header-left">
      <i class="fa fa-pie-chart"></i>
      <div class="card-title-group">
        <h3 class="card-title">Category Breakdown</h3>
        <p class="card-subtitle">High-level distribution of your spend by category</p>
      </div>
    </div>
  </div>
  <div class="card-body" ng-if="vm.isLoading">
    <div class="loading-state">
      <i class="fa fa-spinner fa-spin loading-state-icon"></i>
      <div class="loading-state-text">Loading breakdown...</div>
    </div>
  </div>
  <div class="card-body" ng-if="!vm.isLoading &amp;&amp; vm.error">
    <div class="error-state">
      <i class="fa fa-exclamation-circle error-state-icon"></i>
      <div class="error-state-text">
        <h3>{{vm.error.message}}</h3>
        <p>{{vm.error.details}}</p>
      </div>
    </div>
  </div>
  <div class="card-body" ng-if="!vm.isLoading &amp;&amp; !vm.error &amp;&amp; (!vm.data || !vm.data.categories || vm.data.categories.length === 0)">
    <div class="empty-state">
      <i class="fa fa-info-circle empty-state-icon"></i>
      <div class="empty-state-text">
        <h3>No breakdown data</h3>
        <p>There is no spend to break down for the selected month.</p>
      </div>
    </div>
  </div>
  <div class="card-body" ng-if="!vm.isLoading &amp;&amp; !vm.error &amp;&amp; vm.data &amp;&amp; vm.data.categories &amp;&amp; vm.data.categories.length &gt; 0">
    <div class="chart-container">
      <canvas></canvas>
    </div>
  </div>
</div>
