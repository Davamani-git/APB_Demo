<div class="card breakdown-chart-card" aria-label="Spend by Category Chart">
  <div class="card-header">
    <div class="card-header-left">
      <i class="fa fa-pie-chart card-header-icon" aria-hidden="true"></i>
      <span class="card-header-title">Spend by Category</span>
    </div>
  </div>
  <div class="card-body">
    <canvas id="breakdownChartCanvas" aria-label="Category spend chart"></canvas>
  </div>
  <div class="card-footer">
    <span class="chart-footer-text">This chart shows high-level category distribution without individual transaction details.</span>
  </div>
</div>
