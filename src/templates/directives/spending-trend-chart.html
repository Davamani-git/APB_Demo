<div class="trend-chart-container">
  <div class="chart-wrapper" ng-if="!vm.loading && !vm.error && vm.chartData">
    <canvas aria-label="Six month spending trend" role="img"></canvas>
  </div>
  <div class="empty-state" ng-if="!vm.loading && !vm.error && !vm.chartData">
    <div class="card">
      <div class="card-body text-center">
        <i class="fa fa-info-circle"></i>
        <p>No spending trend data available.</p>
      </div>
    </div>
  </div>
</div>
