<div class="panel panel-default kpi-card" ng-click="onClick()">
  <div class="panel-body">
    <div class="kpi-icon">
      <i class="{{ iconClass }}"></i>
    </div>
    <div class="kpi-content">
      <div class="kpi-label">{{ title }}</div>
      <div class="kpi-value">{{ value }}</div>
    </div>
  </div>
</div>
