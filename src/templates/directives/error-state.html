<div class="error-state" ng-if="error">
  <div class="card error-card">
    <div class="card-body">
      <div class="alert alert-danger">
        <i class="fa fa-exclamation-triangle"></i>
        <strong>Error:</strong> {{ error.message }}
      </div>
      <p class="help-text" ng-if="!error.retryable">If this issue persists, please contact support.</p>
      <button type="button" class="btn btn-primary" ng-if="error.retryable" ng-click="onRetry()">Retry</button>
    </div>
  </div>
</div>
