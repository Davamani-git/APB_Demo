<div class="breakdown-chart-container">
    <div class="chart-empty-state" ng-if="vm.isEmpty && !vm.isLoading">
        <div class="empty-state-content">
            <span class="empty-state-icon fa fa-pie-chart"></span>
            <h4 class="empty-state-title">No category breakdown available</h4>
            <p class="empty-state-description">There is no category-level spending data for the selected month.</p>
        </div>
    </div>
    <div class="chart-loading-state" ng-if="vm.isLoading">
        <div class="loading-spinner-container">
            <img src="src/assets/images/loading-spinner.gif" alt="Loading" class="loading-spinner-image">
            <p class="loading-message">Loading category breakdown...</p>
        </div>
    </div>
    <div class="chart-content" ng-if="!vm.isEmpty && !vm.isLoading">
        <div class="chart-wrapper">
            <canvas aria-label="Category breakdown chart" role="img"></canvas>
        </div>
    </div>
</div>
