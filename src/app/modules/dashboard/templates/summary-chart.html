<div class="ss-card chart-card">
  <div class="ss-card-header">
    <div class="ss-card-title">Monthly Spend Breakdown</div>
    <div>
      <i class="ss-card-icon fa fa-bar-chart"></i>
    </div>
  </div>
  <div class="ss-card-body chart-container">
    <div class="loading-overlay" ng-if="!vm.chartData || !vm.chartData.labels || vm.chartData.labels.length === 0">
      <div class="text-center">
        <span class="glyphicon glyphicon-time"></span>
        <div class="loading-text">Loading spending breakdown...</div>
      </div>
    </div>
    <canvas aria-label="Monthly spending breakdown chart" role="img"></canvas>
  </div>
</div>
