<div class="ss-card chart-card">
  <div class="ss-card-header">
    <div class="ss-card-title">Six-Month Spending Trend</div>
    <div>
      <i class="ss-card-icon fa fa-line-chart"></i>
    </div>
  </div>
  <div class="ss-card-body chart-container" ng-if="vm.chartData && vm.chartData.labels && vm.chartData.labels.length">
    <canvas aria-label="Six-month spending trend chart" role="img"></canvas>
  </div>
  <div class="ss-card-body" ng-if="!vm.chartData || !vm.chartData.labels || !vm.chartData.labels.length">
    <div class="empty-state">
      <div class="empty-state-icon">
        <i class="fa fa-info-circle"></i>
      </div>
      <div class="empty-state-title">No trend data available</div>
      <div class="empty-state-message">
        Spending trends cannot be displayed due to lack of data for the last six months.</div>
    </div>
  </div>
</div>
