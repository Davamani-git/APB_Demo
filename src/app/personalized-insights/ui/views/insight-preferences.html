<div class="container insight-preferences" ng-switch="vm.state">
  <div class="page-header">
    <h1>Insight Preferences</h1>
  </div>

  <div ng-switch-when="loading" class="text-center">
    <loading-spinner></loading-spinner>
  </div>

  <div ng-switch-when="error" class="alert alert-danger">
    {{vm.errorMessage}}
  </div>

  <form ng-switch-when="loaded" name="preferencesForm" novalidate ng-submit="vm.savePreferences()">
    <div class="checkbox">
      <label>
        <input type="checkbox" ng-model="vm.preferences.consent.insightsProcessing"> Enable personalized insights
      </label>
    </div>

    <div class="checkbox">
      <label>
        <input type="checkbox" ng-model="vm.preferences.notifications.email"> Email notifications
      </label>
    </div>
    <div class="checkbox">
      <label>
        <input type="checkbox" ng-model="vm.preferences.notifications.push"> Push notifications
      </label>
    </div>

    <button type="submit" class="btn btn-primary">Save Preferences</button>
  </form>

  <div ng-switch-when="saving" class="text-center">
    <loading-spinner></loading-spinner>
  </div>
</div>
