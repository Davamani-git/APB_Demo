<div class="panel panel-default kpi-card" ng-class="vm.cssClass" aria-label="Monthly summary KPI card">
  <div class="panel-heading">
    <span class="kpi-card-title">{{vm.title}}</span>
    <span class="kpi-card-icon" ng-class="vm.icon" aria-hidden="true"></span>
  </div>
  <div class="panel-body">
    <div class="kpi-card-value" aria-label="{{vm.title}} value">{{vm.value}}</div>
    <div class="kpi-card-subtitle">{{vm.subtitle}}</div>
  </div>
</div>
