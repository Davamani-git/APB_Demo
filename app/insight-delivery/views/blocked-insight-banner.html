<div class="alert alert-warning insight-blocked-banner">
  <strong>Content unavailable.</strong>
  <span ng-if="reasonCode === 'REG_RESTRICTED'">
    Due to regulatory restrictions in your region ({{jurisdiction}}), this insight or recommendation cannot be displayed.
  </span>
  <span ng-if="reasonCode === 'CONSENT_WITHDRAWN'">
    You have opted out of personalized insights. Update your privacy preferences to view this content.
  </span>
  <span ng-if="!reasonCode || (reasonCode !== 'REG_RESTRICTED' && reasonCode !== 'CONSENT_WITHDRAWN')">
    This content is currently unavailable due to policy settings.
  </span>
</div>
