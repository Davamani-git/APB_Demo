<div class="context-recommendations-full" ng-cloak>
  <h2>Context-Aware Recommendations</h2>

  <div ng-if="vm.loading">
    <span class="glyphicon glyphicon-refresh spinning"></span> Loading recommendations...
  </div>
  <div class="alert alert-danger" ng-if="vm.error">{{vm.error}}</div>

  <div class="panel panel-default" ng-if="!vm.loading">
    <div class="panel-heading">Filters</div>
    <div class="panel-body">
      <form class="form-inline">
        <div class="form-group">
          <label for="contextType">Context</label>
          <select id="contextType" class="form-control" ng-model="vm.filters.contextType" ng-change="vm.refresh()">
            <option value="DASHBOARD">Dashboard</option>
            <option value="ACCOUNT">Account</option>
            <option value="INSIGHT">Insight</option>
          </select>
        </div>
      </form>
    </div>
  </div>

  <div ng-if="!vm.loading && vm.recommendations.length">
    <div ng-repeat="rec in vm.recommendations">
      <cr-recommendation-tile recommendation="rec"
                               on-confirm="vm.onConfirm(rec)"
                               on-dismiss="vm.onDismiss(rec)"
                               on-view-details="vm.onViewDetails(rec)"></cr-recommendation-tile>
    </div>
  </div>

  <div ng-if="!vm.loading && !vm.recommendations.length" class="alert alert-info">
    No recommendations available.
  </div>
</div>
