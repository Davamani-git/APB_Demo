<div class="quiet-hours-selector">
  <div class="form-inline">
    <div class="form-group">
      <label>From</label>
      <input type="time" class="form-control" ng-model="quietHours.start">
    </div>
    <div class="form-group">
      <label>To</label>
      <input type="time" class="form-control" ng-model="quietHours.end">
    </div>
  </div>
  <p class="help-block">Notifications will be suppressed during quiet hours where supported.</p>
</div>
