<div class="panel panel-default insight-card" ng-class="{'insight-dismissed': insight.isDismissed}" id-policy-guard="insight">
  <div class="panel-heading">
    <h3 class="panel-title">
      {{insight.title}}
      <span class="label label-info" ng-if="insight.category">{{insight.category}}</span>
      <span class="label label-warning" ng-if="insight.severity">{{insight.severity}}</span>
    </h3>
  </div>
  <div class="panel-body">
    <p>{{insight.summary}}</p>
    <div class="insight-meta">
      <span ng-if="insight.impactAmount">
        Impact: {{insight.impactAmount | piCurrency:insight.currency}}
      </span>
      <span ng-if="insight.timeRange">
        | Period: {{insight.timeRange | piDateRange}}
      </span>
      <span class="text-muted" ng-if="insight.createdAt">
        | Created: {{insight.createdAt | date:'mediumDate'}}
      </span>
    </div>
  </div>
  <div class="panel-footer text-right">
    <button type="button" class="btn btn-default btn-sm" ng-click="onDismiss({ insight: insight })" ng-disabled="insight.isDismissed">
      Dismiss
    </button>
    <button type="button" class="btn btn-primary btn-sm" ng-click="onOpen({ insight: insight })">
      View details
    </button>
  </div>
</div>
