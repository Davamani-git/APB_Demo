<div class="budget-edit" ng-cloak>
  <h2 ng-if="!vm.isEdit">Create Budget</h2>
  <h2 ng-if="vm.isEdit">Edit Budget</h2>

  <div ng-if="vm.loading">
    <span class="glyphicon glyphicon-refresh spinning"></span> Loading...
  </div>
  <div class="alert alert-danger" ng-if="vm.error">{{vm.error}}</div>

  <form name="budgetForm" ng-if="!vm.loading" novalidate ng-submit="vm.save(budgetForm)">
    <div class="form-group" ng-class="{'has-error': budgetForm.name.$invalid && budgetForm.name.$touched}">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" class="form-control" ng-model="vm.model.name" required>
    </div>

    <div class="form-group">
      <label for="category">Category</label>
      <input id="category" type="text" class="form-control" ng-model="vm.model.category">
    </div>

    <div class="form-group">
      <label for="accountId">Masked account</label>
      <input id="accountId" type="text" class="form-control" ng-model="vm.model.accountId">
    </div>

    <div class="form-group" ng-class="{'has-error': budgetForm.limitAmount.$invalid && budgetForm.limitAmount.$touched}">
      <label for="limitAmount">Limit amount</label>
      <input id="limitAmount" name="limitAmount" type="number" min="0.01" step="0.01" class="form-control"
             ng-model="vm.model.limitAmount" required>
    </div>

    <div class="form-group">
      <label for="currency">Currency</label>
      <input id="currency" type="text" class="form-control" ng-model="vm.model.currency">
    </div>

    <div class="form-group">
      <label for="period">Period</label>
      <select id="period" class="form-control" ng-model="vm.model.period">
        <option value="MONTHLY">Monthly</option>
        <option value="WEEKLY">Weekly</option>
      </select>
    </div>

    <div class="checkbox">
      <label>
        <input type="checkbox" ng-model="vm.model.alertEnabled"> Enable alerts
      </label>
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
    <button type="button" class="btn btn-default" ng-click="vm.cancel()">Cancel</button>
  </form>
</div>
