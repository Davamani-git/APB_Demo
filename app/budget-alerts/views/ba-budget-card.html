<div class="panel panel-default budget-card">
  <div class="panel-heading">
    <h3 class="panel-title">{{budget.name}}</h3>
  </div>
  <div class="panel-body">
    <p>Category: {{budget.category || 'All'}}</p>
    <p>Limit: {{budget.limitAmount | baCurrency:budget.currency}}</p>
    <p>Current spend: {{budget.currentSpend | baCurrency:budget.currency}}</p>
    <div class="progress" ng-if="budget.limitAmount">
      <div class="progress-bar" role="progressbar" aria-valuenow="{{(budget.currentSpend / budget.limitAmount) * 100}}"
           aria-valuemin="0" aria-valuemax="100"
           ng-style="{'width': ((budget.currentSpend / budget.limitAmount) * 100) + '%'}">
      </div>
    </div>
    <p>Status: {{budget.status}}</p>
  </div>
  <div class="panel-footer text-right">
    <button type="button" class="btn btn-default btn-sm" ng-click="onEdit({ budget: budget })">Edit</button>
  </div>
</div>
