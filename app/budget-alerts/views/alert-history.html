<div class="alert-history" ng-cloak>
  <h2>Alert History</h2>

  <div ng-if="vm.loading">
    <span class="glyphicon glyphicon-refresh spinning"></span> Loading alerts...</div>
  <div class="alert alert-danger" ng-if="vm.error">{{vm.error}}</div>

  <table class="table table-striped" ng-if="!vm.loading && vm.alerts.length">
    <thead>
      <tr>
        <th>Date</th>
        <th>Category</th>
        <th>Amount</th>
        <th>Channel</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr ba-alert-row ng-repeat="alert in vm.alerts" alert="alert"></tr>
    </tbody>
  </table>

  <div ng-if="!vm.loading && !vm.alerts.length" class="alert alert-info">
    No alerts found.
  </div>
</div>
