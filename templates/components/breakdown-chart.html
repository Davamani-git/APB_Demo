<div class="breakdown-chart-container">
    <div class="breakdown-chart-header">
        <span class="breakdown-chart-title">Category-wise spend distribution</span>
    </div>
    <div class="breakdown-chart-body" ng-if="vm.hasData()">
        <canvas id="breakdownChartCanvas"></canvas>
        <div class="chart-legend-note">Hover over slices to see category shares.</div>
    </div>
    <div class="empty-state" ng-if="!vm.hasData()">
        <i class="fa fa-inbox empty-icon"></i>
        <div class="empty-message">No data to display.</div>
        <div class="empty-description">Spend breakdown is unavailable for this month.</div>
    </div>
</div>
