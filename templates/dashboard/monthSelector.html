<div class="month-selector-container">
    <span class="month-selector-label">Select month</span>
    <select class="form-control month-selector-dropdown" ng-model="vm.internalSelectedMonth" ng-change="vm.handleChange()" ng-options="month.month as (month.month | dateFormat) for month in vm.months">
        <option value="">-- Choose a month --</option>
    </select>
</div>
