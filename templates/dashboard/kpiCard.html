<div class="kpi-card">
    <div class="kpi-icon">
        <i class="fa" ng-class="vm.iconClass" aria-hidden="true"></i>
    </div>
    <div class="kpi-content">
        <div class="kpi-title">{{vm.label}}</div>
        <div class="kpi-primary-value">{{vm.value}}</div>
        <div class="kpi-supporting-label" ng-if="vm.supportingLabel">{{vm.supportingLabel}}</div>
        <div class="kpi-trend" ng-if="vm.trendIndicator">
            <span ng-class="{
                'kpi-trend-up': vm.trendIndicator === 'up',
                'kpi-trend-down': vm.trendIndicator === 'down',
                'kpi-trend-neutral': vm.trendIndicator === 'neutral'
            }">
                <i class="fa" ng-class="vm.trendIcon" aria-hidden="true"></i>
                {{vm.trendText}}
            </span>
        </div>
    </div>
</div>
